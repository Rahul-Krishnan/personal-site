name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when new commits are pushed to the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to full commit SHAs rather than tags.
      # Tags are mutable: a compromised or maliciously re-tagged action would
      # otherwise run attacker-controlled code in CI with this repo's token
      # scope. The trailing comment records the tag each SHA was resolved
      # from so humans and update tooling can still see the intended version.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
